<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Game Radar Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <header class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
    <h1 class="text-2xl font-bold">🎮 Game Radar Pro</h1>
    <div id="range" class="text-sm px-2 py-1 rounded-full border border-slate-300 bg-white">—</div>
  </header>

  <main class="max-w-7xl mx-auto px-4 grid grid-cols-12 gap-4">
    <section class="col-span-12 lg:col-span-9">
      <div class="grid md:grid-cols-6 grid-cols-2 gap-2 bg-white p-3 rounded-xl border border-slate-200 shadow-sm">
        <select id="daysBack" class="border rounded-lg p-2">
          <option value="1">Last 1 day</option>
          <option value="3" selected>Last 3 days</option>
          <option value="7">Last 7 days</option>
          <option value="14">Last 14 days</option>
        </select>
        <input id="platforms" class="border rounded-lg p-2" placeholder="platforms (pc,ps5,android) — leave blank to widen" />
        <input id="tags" class="border rounded-lg p-2" placeholder="tags (roguelite,pixel-graphics)" />
        <select id="ordering" class="border rounded-lg p-2">
          <option value="-rating" selected>Top rating</option>
          <option value="-added">Most added</option>
          <option value="-metacritic">Metacritic</option>
          <option value="-released">Newest</option>
        </select>
        <input id="minRating" type="number" min="0" max="5" step="0.1" class="border rounded-lg p-2" placeholder="min rating (0–5)" />
        <label class="flex items-center gap-2 text-sm"><input id="hideSeen" type="checkbox" checked/> Hide seen</label>
        <button id="fetchBtn" class="md:col-span-2 col-span-2 bg-slate-900 text-white rounded-lg py-2 hover:bg-black">Fetch</button>
        <button id="dailyBtn" class="bg-indigo-600 text-white rounded-lg py-2 hover:bg-indigo-700">Run Daily Snapshot</button>
        <a href="/api/daily" target="_blank" class="text-indigo-700 underline md:col-span-2 col-span-2">View Snapshots (JSON)</a>
      </div>

      <div id="notice" class="mt-3 text-sm text-rose-700 hidden"></div>
      <div id="grid" class="grid lg:grid-cols-3 md:grid-cols-2 grid-cols-1 gap-3 mt-4"></div>
    </section>

    <aside class="col-span-12 lg:col-span-3 space-y-4">
      <div class="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
        <h2 class="font-semibold mb-3">Weights</h2>
        <div class="space-y-3 text-sm">
          <div><label class="flex justify-between"><span>Rating</span><span id="wRatingVal">0.5</span></label><input id="wRating" type="range" min="0" max="1" step="0.05" value="0.5" class="w-full"></div>
          <div><label class="flex justify-between"><span>Tag Like</span><span id="wLikeVal">4</span></label><input id="wLike" type="range" min="0" max="10" step="0.5" value="4" class="w-full"></div>
          <div><label class="flex justify-between"><span>Tag Skip (penalty)</span><span id="wSkipVal">-2</span></label><input id="wSkip" type="range" min="-10" max="0" step="0.5" value="-2" class="w-full"></div>
          <div><label class="flex justify-between"><span>Recency</span><span id="wRecencyVal">0.1</span></label><input id="wRecency" type="range" min="0" max="1" step="0.05" value="0.1" class="w-full"></div>
          <button id="saveWeights" class="mt-2 w-full bg-slate-900 text-white rounded-lg py-2 hover:bg-black">Save Weights</button>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
        <h2 class="font-semibold mb-3">Taste (Tags)</h2>
        <div class="text-sm">Likes</div>
        <div id="likes" class="flex flex-wrap gap-2 my-2"></div>
        <div class="text-sm mt-3">Skips</div>
        <div id="skips" class="flex flex-wrap gap-2 my-2"></div>
      </div>
    </aside>
  </main>

  <template id="card-tpl">
    <article class="rounded-xl border border-slate-200 overflow-hidden bg-white shadow-sm flex flex-col">
      <div class="aspect-video bg-slate-200 bg-cover bg-center"></div>
      <div class="p-3 flex flex-col gap-2">
        <div class="flex items-center justify-between gap-2">
          <h3 class="font-semibold line-clamp-1"></h3>
          <span class="text-xs px-2 py-0.5 rounded-full border border-slate-300 bg-slate-50"></span>
        </div>
        <div class="text-xs flex justify-between">
          <span class="opacity-80">⭐ <b class="rating"></b> (<span class="rc"></span>)</span>
          <span class="opacity-70 released"></span>
        </div>
        <div class="text-[11px] flex flex-wrap gap-1 tags"></div>
        <div class="text-[11px] opacity-80 platforms"></div>
        <div class="flex gap-2 mt-1">
          <button class="like px-2 py-1 bg-emerald-600 text-white rounded-md text-sm">👍 Like</button>
          <button class="skip px-2 py-1 bg-rose-600 text-white rounded-md text-sm">👎 Skip</button>
          <a class="px-2 py-1 border rounded-md text-sm" target="_blank">RAWG</a>
        </div>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
